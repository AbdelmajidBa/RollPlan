name: .NET CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore RollPlan.sln

      - name: Build
        run: dotnet build RollPlan.sln --no-restore

      - name: Test
        run: dotnet test RollPlan.sln --no-build --verbosity normal

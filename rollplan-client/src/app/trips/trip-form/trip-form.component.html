<div class="page-trips min-h-screen bg-slate-950 px-4 py-12 text-slate-100">
  <div class="mx-auto max-w-2xl">
    <section class="rounded-[2rem] bg-slate-900/90 p-8 shadow-[0_30px_80px_rgba(15,23,42,0.55)] ring-1 ring-white/10 backdrop-blur-xl">
      <div class="mb-8 flex items-start gap-4 rounded-3xl bg-slate-800/80 p-6">
        <div class="flex h-16 w-16 items-center justify-center rounded-3xl bg-sky-600 text-2xl font-semibold text-white shadow-lg shadow-sky-500/20">
          +
        </div>
        <div>
          <p class="text-xs uppercase tracking-[0.24em] text-sky-200/70">Trips</p>
          <h1 class="mt-3 text-3xl font-semibold text-white">Create a new trip</h1>
          <p class="mt-3 text-sm text-slate-300/90">Give your trip a name and start planning your itinerary.</p>
        </div>
      </div>

      <div *ngIf="serverError()" class="mb-4 rounded-3xl bg-red-50/90 border border-red-200 p-4 text-sm text-red-700">
        {{ serverError() }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6" novalidate>
        <div class="space-y-4 rounded-3xl bg-slate-950/80 p-6 ring-1 ring-white/10">

          <div class="form-field">
            <label for="name" class="block text-sm font-semibold text-slate-200 mb-2">
              Trip Name <span class="text-red-400">*</span>
            </label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="e.g. Summer in Japan"
              class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-slate-100 transition focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/25"
              [class.border-red-500]="nameControl.invalid && nameControl.touched"
            />
            <p *ngIf="nameControl.touched && nameControl.hasError('required')" class="mt-2 text-xs text-red-400">
              Trip name is required.
            </p>
          </div>

          <div class="form-field">
            <label for="description" class="block text-sm font-semibold text-slate-200 mb-2">Description</label>
            <textarea
              id="description"
              formControlName="description"
              rows="3"
              placeholder="What's this trip about?"
              class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-slate-100 transition focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/25 resize-none"
            ></textarea>
          </div>

          <div class="form-field">
            <label for="coverImage" class="block text-sm font-semibold text-slate-200 mb-2">Cover Image</label>
            <input
              id="coverImage"
              type="file"
              accept="image/jpeg,image/png"
              (change)="onFileChange($event)"
              class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-slate-400 transition file:mr-4 file:rounded-xl file:border-0 file:bg-sky-600 file:px-3 file:py-1 file:text-xs file:font-semibold file:text-white hover:file:bg-sky-700"
            />
            <p class="mt-1 text-xs text-slate-500">JPG or PNG, max 10 MB (optional)</p>
            <p *ngIf="fileError()" class="mt-2 text-xs text-red-400">{{ fileError() }}</p>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="isSubmitting()"
          class="inline-flex w-full items-center justify-center rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-sky-500/20 transition hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          <span *ngIf="isSubmitting(); else submitLabel">Creating…</span>
          <ng-template #submitLabel>Create Trip</ng-template>
        </button>
      </form>
    </section>
  </div>
</div>
